name: CI-CD

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: [self-hosted, linux]

    env:
      RUNNER_TOOL_CACHE: $HOME/.toolcache

    steps:
    - uses: actions/checkout@v4

    - run: mkdir -p "$HOME/.toolcache"

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - run: dotnet restore
    - run: dotnet build
    - run: dotnet test
