name: CI-CD

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: [self-hosted, linux]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - run: dotnet restore
    - run: dotnet build
    - run: dotnet test
